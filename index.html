<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kade → Psych Converter PRO</title>
<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}
button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>🔥 Kade → Psych Converter 🔥</h1>

<input type="file" id="fileInput" accept=".json">

<br>

<button onclick="convert()">Convertir</button>
<button onclick="download()">Descargar JSON</button>

<p id="status"></p>

<script>
let convertedData = null;

function convert() {
    const file = document.getElementById('fileInput').files[0];

    if (!file) {
        alert("Seleccioná un archivo primero bro 😤");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
        try {
            let data = JSON.parse(e.target.result);
            let songData = data.song ? data.song : data;

            let psych = {
                song: {
                    song: songData.song || "unknown",
                    bpm: songData.bpm || 120,
                    speed: songData.speed || 1,
                    notes: [],
                    events: [],
                    needsVoices: true,
                    player1: songData.player1 || "bf",
                    player2: songData.player2 || "dad"
                }
            };

            if (!songData.notes) {
                document.getElementById("status").innerText = "❌ JSON inválido";
                return;
            }

            for (let section of songData.notes) {
                let newSection = {
                    lengthInSteps: section.lengthInSteps || 16,
                    mustHitSection: section.mustHitSection || false,
                    sectionNotes: []
                };

                if (section.sectionNotes) {
                    for (let note of section.sectionNotes) {
                        newSection.sectionNotes.push([
                            note[0],
                            note[1],
                            note[2] || 0,
                            0
                        ]);
                    }
                }

                psych.song.notes.push(newSection);
            }

            convertedData = JSON.stringify(psych, null, 2);
            document.getElementById("status").innerText = "✅ Convertido con éxito";

        } catch (err) {
            document.getElementById("status").innerText = "💀 Error leyendo el archivo";
        }
    };

    reader.readAsText(file);
}

function download() {
    if (!convertedData) {
        alert("Primero convertí algo bro 😤");
        return;
    }

    const blob = new Blob([convertedData], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "psych-chart.json";
    a.click();

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
